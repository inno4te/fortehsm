name: Build ForTe Fam APK

on:
  push:
    branches: [main, master]
    paths-ignore:
      - 'README.md'
      - 'README-ANDROID.md'
      - 'Code.gs'
  pull_request:
    branches: [main, master]
  workflow_dispatch:        # lets you trigger a build manually from the Actions tab
  release:
    types: [created]

permissions:
  contents: write           # required so action-gh-release can attach the APK to a tag

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-34 build-tools;34.0.0'

      - name: Copy web app into Android assets
        run: |
          mkdir -p android/app/src/main/assets/www
          cp index.html android/app/src/main/assets/www/index.html
          echo "Bundled web app size:"
          ls -lh android/app/src/main/assets/www/

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.7'

      - name: Build debug APK
        working-directory: android
        run: gradle assembleDebug --no-daemon --stacktrace

      - name: Rename APK
        run: |
          mkdir -p out
          cp android/app/build/outputs/apk/debug/app-debug.apk \
             out/ForTeFam-${{ github.sha }}.apk
          cp android/app/build/outputs/apk/debug/app-debug.apk \
             out/ForTeFam-latest.apk
          ls -lh out/

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ForTeFam-APK
          path: out/*.apk
          retention-days: 90

      - name: Attach APK to GitHub Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: out/ForTeFam-latest.apk
